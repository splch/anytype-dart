name: anytype_dart
description: >
  A cross-platform Flutter client fully compatible with the Anytype network.
  Reimplements all middleware from scratch in Dart, depending only on
  MIT-licensed any-sync protocol code.
  Part of the anyproto ecosystem.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  # Crypto
  pointycastle: ^3.9.1
  cryptography: ^2.7.0
  convert: ^3.1.1
  # Protobuf / gRPC
  protobuf: ^4.0.0
  grpc: ^4.0.1
  # Storage
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.0
  # Key storage
  flutter_secure_storage: ^9.0.0
  # BIP39 mnemonic
  bip39: ^1.0.6
  # Network discovery
  nsd: ^3.0.0
  # State management
  provider: ^6.1.1
  # Encoding
  bs58check: ^1.0.2
  # Misc
  collection: ^1.18.0
  meta: ^1.12.0
  path: ^1.9.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.0
  build_runner: ^2.4.0
  drift_dev: ^2.15.0
  flutter_lints: ^3.0.0
  hex: ^0.2.0

flutter:
  uses-material-design: true
